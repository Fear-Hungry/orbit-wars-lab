x-lab-common: &lab-common
  working_dir: /workspace
  tty: true
  stdin_open: true
  cpus: ${TRAIN_CPUS:-4.0}
  mem_limit: ${TRAIN_MEMORY:-8g}
  pids_limit: ${TRAIN_PIDS:-512}
  shm_size: ${TRAIN_SHM_SIZE:-1g}
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    - /tmp:size=${TRAIN_TMPFS:-536870912},mode=1777
  environment: &lab-env
    CODEX_HOME: /home/orbit/.codex
    PYTHONPATH: /workspace:/workspace/python
    OMP_NUM_THREADS: ${OMP_NUM_THREADS:-1}
    OPENBLAS_NUM_THREADS: ${OPENBLAS_NUM_THREADS:-1}
    MKL_NUM_THREADS: ${MKL_NUM_THREADS:-1}
    NUMEXPR_NUM_THREADS: ${NUMEXPR_NUM_THREADS:-1}
    RAYON_NUM_THREADS: ${RAYON_NUM_THREADS:-4}
    CARGO_BUILD_JOBS: ${CARGO_BUILD_JOBS:-2}
    TOKENIZERS_PARALLELISM: "false"

services:
  lab:
    <<: *lab-common
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        TORCH_COMPUTE_PLATFORM: cpu
    image: orbit-wars-lab:cpu
    volumes:
      - .:/workspace
      - orbit-wars-venv-cpu:/opt/venv
      - ${HOME}/.codex:/home/orbit/.codex
      - ${HOME}/.local/bin:/home/orbit/.local/bin:ro
      - ${HOME}/.local/lib/node_modules:/home/orbit/.local/lib/node_modules:ro

  lab-gpu:
    <<: *lab-common
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        TORCH_COMPUTE_PLATFORM: ${TORCH_COMPUTE_PLATFORM:-cu118}
    image: orbit-wars-lab:gpu
    environment:
      <<: *lab-env
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    volumes:
      - .:/workspace
      - orbit-wars-venv-gpu:/opt/venv
      - ${HOME}/.codex:/home/orbit/.codex
      - ${HOME}/.local/bin:/home/orbit/.local/bin:ro
      - ${HOME}/.local/lib/node_modules:/home/orbit/.local/lib/node_modules:ro
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]

volumes:
  orbit-wars-venv-cpu:
  orbit-wars-venv-gpu:
